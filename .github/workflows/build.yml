# Reusable build workflow.
# Called by ci.yml (or any other orchestrator) via `uses: ./.github/workflows/build.yml`.
#
# Inputs:
#   image_name   – image name on GHCR, e.g. gabos or gabos-nvidia  (required)
#   containerfile – path to the Containerfile to use               (default: ./Containerfile)
#   push_image   – whether to push the result to GHCR              (default: true)
#
# Outputs:
#   tags      – space-separated list of tags that were applied
#   date_tag  – the plain YYYYMMDD tag used in this build

name: Build container image

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Image name on GHCR (e.g. gabos, gabos-nvidia)'
        required: true
        type: string
      containerfile:
        description: 'Relative path to the Containerfile'
        required: false
        type: string
        default: './Containerfile'
      push_image:
        description: 'Push the image to GHCR after building'
        required: false
        type: boolean
        default: true
    outputs:
      tags:
        description: 'Space-separated image tags produced by this build'
        value: ${{ jobs.build_push.outputs.tags }}
      date_tag:
        description: 'The YYYYMMDD date tag for this build'
        value: ${{ jobs.build_push.outputs.date_tag }}

env:
  IMAGE_DESC: "GabOS base image, built from latest image of this repository. Based on RakuOS."
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue,rakuos,gabos,titanoboa,fedora,linux,container"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

jobs:
  build_push:
    name: Build and push ${{ inputs.image_name }}
    runs-on: ubuntu-24.04

    outputs:
      tags: ${{ steps.metadata.outputs.tags }}
      date_tag: ${{ steps.date.outputs.tag }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}"  >> "${GITHUB_ENV}"
          # image_name is already the exact name we want on GHCR (e.g. gabos-nvidia)
          echo "IMAGE_NAME=${{ inputs.image_name }}" >> "${GITHUB_ENV}"
          # Extract bare repo name (strips "owner/" prefix) for use in labels/URLs
          echo "REPO_NAME=${GITHUB_REPOSITORY#*/}"   >> "${GITHUB_ENV}"

      # Pinned by renovatebot — do not edit the hash manually
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> "$GITHUB_OUTPUT"
          echo "tag=$(date -u +%Y%m%d)"                     >> "$GITHUB_OUTPUT"

      - name: Image Metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: metadata
        with:
          # Note: type=sha and type=ref,event=pr are omitted here because in a
          # workflow_call context github.event_name is always "workflow_call", so
          # those rules would never fire. PR dry-run builds simply don't push
          # (push_image=false), so no tags are needed for them.
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.REPO_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.REPO_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.REPO_NAME }}/blob/${{ github.sha }}/${{ inputs.containerfile }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.REPO_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Extract base image from Containerfile
        run: |
          echo "BASE_IMAGE=$(cat ${{ inputs.containerfile }} | grep -i FROM | head -n 2 | tail -n 1 | cut -d' ' -f2)" >> ${GITHUB_ENV}

      - name: Cache Container Images
        id: cache-container-images
        uses: jamesmortensen/cache-container-images-action@v1.0.1
        with:
          images: |
            ${{ env.BASE_IMAGE }}

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ${{ inputs.containerfile }}
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          oci: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        uses: redhat-actions/push-to-registry@5ed88d269cf581ea9ef6dd6806d01562096bee9c # v2
        if: inputs.push_image
        id: push
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}